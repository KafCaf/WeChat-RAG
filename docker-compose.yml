services:
  es:
    image: elasticsearch:8.17.1
    container_name: rag-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./stopwords.txt:/usr/share/elasticsearch/config/stopwords.txt:ro
    ports:
      - "127.0.0.1:9200:9200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: rag-backend
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - TARGET_MODEL=${TARGET_MODEL:-deepseek-chat}
      - DASHSCOPE_EMBED_MODEL=${DASHSCOPE_EMBED_MODEL:-text-embedding-v4}
      - DASHSCOPE_RERANK_MODEL=${DASHSCOPE_RERANK_MODEL:-gte-rerank}
      - ES_INDEX=${ES_INDEX:-index_user_test}
      - ES_URL=http://es:9200
    volumes:
      - ./knowledge_base:/app/knowledge_base
    ports:
      - "6006:6006"
    depends_on:
      es:
        condition: service_healthy
    restart: unless-stopped

volumes:
  es-data:
